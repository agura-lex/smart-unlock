on:
  push:
    branches:
      - main

name: "ShellCheck"

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
            check_together: 'yes'
            scandir: './modules'
